name: mcp-security

on:
  pull_request:
  push:
    branches: [main]

jobs:
  mcp-hardening:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate MCP hardening tooling
        run: python -m unittest tools.trae_mcp_hardening.tests.test_validate_mcp -q

