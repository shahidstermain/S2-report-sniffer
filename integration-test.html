<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend-Backend Integration Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; color: #155724; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; color: #721c24; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; color: #0c5460; }
        button { margin: 5px; padding: 10px 15px; cursor: pointer; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🚀 Frontend-Backend Integration Test</h1>
    
    <div class="test-section">
        <h2>Backend Status</h2>
        <button onclick="testBackendHealth()">Test Backend Health</button>
        <div id="backend-status"></div>
    </div>

    <div class="test-section">
        <h2>API Endpoints</h2>
        <button onclick="testApiEndpoints()">Test All Endpoints</button>
        <div id="api-tests"></div>
    </div>

    <div class="test-section">
        <h2>File Upload Test</h2>
        <input type="file" id="fileInput" accept=".zip,.tar.gz">
        <button onclick="testFileUpload()">Test Upload</button>
        <div id="upload-result"></div>
    </div>

    <div class="test-section">
        <h2>CORS Test</h2>
        <button onclick="testCors()">Test CORS</button>
        <div id="cors-result"></div>
    </div>

    <script>
        const API_BASE = '/api';
        
        function showResult(elementId, success, message, data = null) {
            const element = document.getElementById(elementId);
            element.className = success ? 'success' : 'error';
            element.innerHTML = `
                <strong>${success ? '✅ Success' : '❌ Error'}</strong><br>
                ${message}
                ${data ? '<pre>' + JSON.stringify(data, null, 2) + '</pre>' : ''}
            `;
        }

        async function testBackendHealth() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                showResult('backend-status', response.ok, `Backend is ${data.status}`, data);
            } catch (error) {
                showResult('backend-status', false, error.message);
            }
        }

        async function testApiEndpoints() {
            const endpoints = [
                { name: 'Health', url: '/health' },
                { name: 'Reports List', url: '/reports' },
                { name: 'Alerts', url: '/alerts' },
                { name: 'Performance Metrics', url: '/metrics/performance' }
            ];

            const results = document.getElementById('api-tests');
            results.innerHTML = '';

            for (const endpoint of endpoints) {
                try {
                    const response = await fetch(`${API_BASE}${endpoint.url}`);
                    const data = await response.json();
                    const div = document.createElement('div');
                    div.className = response.ok ? 'success' : 'error';
                    div.innerHTML = `<strong>${endpoint.name}:</strong> ${response.status} ${response.statusText}`;
                    results.appendChild(div);
                } catch (error) {
                    const div = document.createElement('div');
                    div.className = 'error';
                    div.innerHTML = `<strong>${endpoint.name}:</strong> ${error.message}`;
                    results.appendChild(div);
                }
            }
        }

        async function testFileUpload() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) {
                showResult('upload-result', false, 'Please select a file');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(`${API_BASE}/reports/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                showResult('upload-result', response.ok, 
                    response.ok ? 'File uploaded successfully' : 'Upload failed', 
                    data
                );
            } catch (error) {
                showResult('upload-result', false, error.message);
            }
        }

        async function testCors() {
            try {
                // Test CORS by making a request from a different origin
                const response = await fetch(`${API_BASE}/health`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Test-Header': 'cors-test'
                    }
                });
                
                showResult('cors-result', response.ok, 
                    response.ok ? 'CORS is working properly' : 'CORS issue detected'
                );
            } catch (error) {
                showResult('cors-result', false, `CORS Error: ${error.message}`);
            }
        }

        // Auto-run basic tests on page load
        window.addEventListener('load', () => {
            setTimeout(() => {
                testBackendHealth();
                testCors();
            }, 1000);
        });
    </script>
</body>
</html>
